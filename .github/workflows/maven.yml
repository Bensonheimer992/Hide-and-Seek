name: Build and Release Minecraft Plugin

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean package

      - name: Extract version from pom.xml
        id: extract_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "PLUGIN_VERSION=${VERSION}-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Rename JAR file with version
        run: |
          mkdir -p release
          JAR_FILE=$(find target -name "*.jar" | head -n 1)
          cp "$JAR_FILE" "release/Plugin-${PLUGIN_VERSION}.jar"

      - name: Create pre-release
        uses: actions/create-release@v1
        with:
          tag_name: "v${{ env.PLUGIN_VERSION }}"
          release_name: "Release v${{ env.PLUGIN_VERSION }}"
          draft: false
          prerelease: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
